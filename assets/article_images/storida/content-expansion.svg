<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="#0f172a"/>
  <text x="400" y="40" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="18" font-weight="bold">Content Type Expansion Architecture</text>
  <!-- Before -->
  <rect x="40" y="65" width="300" height="50" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <text x="190" y="85" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-size="11">Before: 30+ hardcoded "동화/children"</text>
  <text x="190" y="103" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">성인 콘텐츠에 "아이들이 이해하기 쉬운 단어" 적용</text>
  <line x1="340" y1="90" x2="380" y2="90" stroke="#fbbf24" stroke-width="2" marker-end="url(#a8)"/>
  <!-- After -->
  <rect x="380" y="65" width="380" height="50" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="570" y="85" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="11">After: PromptResolver + content_type 분기</text>
  <text x="570" y="103" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">DB 설정 조회 → 폴백 상수 → 타입별 자동 전환</text>
  <!-- PromptResolver -->
  <rect x="220" y="140" width="360" height="80" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="400" y="165" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="13" font-weight="bold">PromptResolver</text>
  <text x="400" y="188" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">resolve(baseKey, contentType)</text>
  <text x="400" y="208" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">DB system_settings → 폴백 상수 맵 → 캐시</text>
  <!-- Input arrows -->
  <line x1="100" y1="165" x2="220" y2="165" stroke="#475569" stroke-width="1" marker-end="url(#a8b)"/>
  <text x="60" y="155" fill="#60a5fa" font-family="monospace" font-size="9">context.ts</text>
  <line x1="100" y1="180" x2="220" y2="180" stroke="#475569" stroke-width="1" marker-end="url(#a8b)"/>
  <text x="40" y="175" fill="#a78bfa" font-family="monospace" font-size="9">image-regen.ts</text>
  <line x1="100" y1="195" x2="220" y2="195" stroke="#475569" stroke-width="1" marker-end="url(#a8b)"/>
  <text x="30" y="195" fill="#34d399" font-family="monospace" font-size="9">generation.svc.ts</text>
  <!-- Content types -->
  <rect x="40" y="250" width="160" height="60" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="120" y="275" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="12" font-weight="bold">fairytale</text>
  <text x="120" y="298" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">어린이 · 쉬운 어휘 · 교육적</text>
  <rect x="220" y="250" width="160" height="60" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="300" y="275" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="12" font-weight="bold">general</text>
  <text x="300" y="298" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">성인 · 자유 문체 · 제한 없음</text>
  <rect x="400" y="250" width="160" height="60" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-dasharray="4"/>
  <text x="480" y="275" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="12">essay?</text>
  <text x="480" y="298" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">향후 확장 가능</text>
  <rect x="580" y="250" width="160" height="60" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-dasharray="4"/>
  <text x="660" y="275" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="12">poem?</text>
  <text x="660" y="298" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">DB 마이그레이션 불필요</text>
  <!-- Features -->
  <rect x="40" y="335" width="720" height="45" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="400" y="355" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">F1 타입 선택 · F2 프롬프트 분기 · F4 하드코딩 제거 · F5 글쓰기 · F6 글→책 · F7 자동 프로파일링 · F10 이미지 모드</text>
  <text x="400" y="372" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">하위 호환 100% — 기존 fairytale 사용자는 아무 변경 없음</text>
  <defs>
    <marker id="a8" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#fbbf24"/>
    </marker>
    <marker id="a8b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569"/>
    </marker>
  </defs>
</svg>
