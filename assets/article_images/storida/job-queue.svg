<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="#0f172a"/>
  <text x="400" y="40" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="18" font-weight="bold">DB-Based Job Queue System</text>
  <!-- User Request -->
  <rect x="40" y="70" width="150" height="50" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="115" y="100" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="11">User Request</text>
  <line x1="190" y1="95" x2="230" y2="95" stroke="#475569" stroke-width="1.5" marker-end="url(#a4)"/>
  <!-- Backend -->
  <rect x="230" y="70" width="200" height="50" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="330" y="90" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="11">Backend</text>
  <text x="330" y="108" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">Job 등록 → 즉시 응답 &lt;1초</text>
  <line x1="430" y1="95" x2="470" y2="95" stroke="#475569" stroke-width="1.5" marker-end="url(#a4)"/>
  <!-- Jobs table -->
  <rect x="470" y="65" width="280" height="60" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="610" y="90" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="12" font-weight="bold">jobs table (PostgreSQL)</text>
  <text x="610" y="112" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">PENDING → PROCESSING → COMPLETED | FAILED</text>
  <!-- Scheduler -->
  <line x1="610" y1="125" x2="610" y2="160" stroke="#475569" stroke-width="1.5" marker-end="url(#a4)"/>
  <text x="640" y="148" fill="#fbbf24" font-family="monospace" font-size="8">30s poll</text>
  <rect x="430" y="160" width="330" height="80" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="595" y="185" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="12" font-weight="bold">Scheduler (max 3 concurrent)</text>
  <text x="520" y="210" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="10">Claude → 텍스트</text>
  <text x="680" y="210" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="10">Gemini → 이미지</text>
  <text x="595" y="230" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">재시도 3회 · Stale Job 자동 복구</text>
  <!-- Realtime -->
  <line x1="430" y1="200" x2="310" y2="200" stroke="#10b981" stroke-width="1" stroke-dasharray="4" marker-end="url(#a4)"/>
  <text x="370" y="195" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="8">Realtime</text>
  <!-- Web UI -->
  <rect x="40" y="160" width="260" height="80" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="170" y="185" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="12" font-weight="bold">Web — 실시간 진행률</text>
  <text x="170" y="210" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Supabase Realtime 구독</text>
  <text x="170" y="228" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">10초 폴링 보조</text>
  <!-- Performance comparison -->
  <rect x="40" y="275" width="350" height="100" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <text x="215" y="298" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-size="11" font-weight="bold">Before (Sync)</text>
  <text x="215" y="320" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">응답: 2~4분 · 동시 처리: 무제한</text>
  <text x="215" y="340" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">피드백: 없음 · 타임아웃: 발생</text>
  <text x="215" y="360" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="9">Vercel 60초 제한 초과</text>
  <rect x="410" y="275" width="350" height="100" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <text x="585" y="298" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="11" font-weight="bold">After (Async Job Queue)</text>
  <text x="585" y="320" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">응답: &lt;1초 · 동시 처리: 최대 3개</text>
  <text x="585" y="340" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">피드백: 실시간 · 타임아웃: 없음</text>
  <text x="585" y="360" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="9">자동 재시도로 장애 복구</text>
  <defs>
    <marker id="a4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569"/>
    </marker>
  </defs>
</svg>
