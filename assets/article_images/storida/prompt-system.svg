<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="#0f172a"/>
  <text x="400" y="40" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="18" font-weight="bold">AI Prompt System</text>
  <!-- Template -->
  <rect x="40" y="70" width="220" height="120" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="150" y="95" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="12" font-weight="bold">Template (DB)</text>
  <text x="150" y="120" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">{{주인공_이름}}</text>
  <text x="150" y="140" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">{{작문_프롬프트}}</text>
  <text x="150" y="160" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">{{캐릭터_설명}}</text>
  <text x="150" y="180" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">{{장면_수}}</text>
  <!-- Arrow -->
  <line x1="260" y1="130" x2="310" y2="130" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <!-- Variables -->
  <rect x="310" y="70" width="180" height="120" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="400" y="95" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="12" font-weight="bold">Variables</text>
  <text x="400" y="120" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">사용자 입력</text>
  <text x="400" y="140" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">DB 테이블 조회</text>
  <text x="400" y="160" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">요금제 제한값</text>
  <text x="400" y="180" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">AI 분석 결과</text>
  <!-- Arrow -->
  <line x1="490" y1="130" x2="540" y2="130" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <!-- Final Prompt -->
  <rect x="540" y="70" width="220" height="120" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="650" y="95" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="12" font-weight="bold">Final Prompt</text>
  <text x="650" y="120" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">토토</text>
  <text x="650" y="140" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">이솝우화 스타일...</text>
  <text x="650" y="160" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">용감한 강아지</text>
  <text x="650" y="180" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">5장면</text>
  <!-- AI Analysis Pipeline -->
  <rect x="40" y="230" width="340" height="140" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="210" y="255" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="12" font-weight="bold">Writing Style Analysis</text>
  <text x="210" y="280" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">글 샘플 2~3개 입력</text>
  <text x="130" y="305" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="10">Claude 분석</text>
  <line x1="185" y1="300" x2="215" y2="300" stroke="#475569" stroke-width="1"/>
  <text x="290" y="305" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="10">tone, voice, prompt</text>
  <text x="210" y="330" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10">→ {{작문_프롬프트}} 변수에 치환</text>
  <text x="210" y="355" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">배포 없이 Admin에서 즉시 변경 가능</text>
  <!-- Image Style Analysis -->
  <rect x="420" y="230" width="340" height="140" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="590" y="255" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="12" font-weight="bold">Image Style Analysis</text>
  <text x="590" y="280" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">한글 설명 입력</text>
  <text x="510" y="305" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="10">Claude 분석</text>
  <line x1="555" y1="300" x2="585" y2="300" stroke="#475569" stroke-width="1"/>
  <text x="670" y="305" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="10">style_prompt (EN)</text>
  <text x="590" y="330" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10">→ Gemini 이미지 프롬프트에 주입</text>
  <text x="590" y="355" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">512x512 미리보기 자동 생성</text>
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569"/>
    </marker>
  </defs>
</svg>
