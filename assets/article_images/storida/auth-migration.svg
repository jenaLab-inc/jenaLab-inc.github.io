<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="#0f172a"/>
  <text x="400" y="40" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="18" font-weight="bold">Auth Migration: Supabase → Firebase</text>
  <!-- Before -->
  <rect x="40" y="70" width="340" height="140" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="210" y="95" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-size="13" font-weight="bold">Before: Supabase All-in-One</text>
  <text x="210" y="125" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="11">Supabase Auth — 인증</text>
  <text x="210" y="145" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="11">Supabase DB — PostgreSQL</text>
  <text x="210" y="165" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="11">Supabase Storage — 파일</text>
  <text x="210" y="185" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="11">Supabase Realtime — WebSocket</text>
  <text x="210" y="200" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="9">단일 프로젝트에 모든 것이 종속</text>
  <!-- Arrow -->
  <line x1="380" y1="140" x2="420" y2="140" stroke="#fbbf24" stroke-width="2" marker-end="url(#a2)"/>
  <!-- After -->
  <rect x="420" y="70" width="340" height="140" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="590" y="95" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="13" font-weight="bold">After: Best-of-Breed</text>
  <text x="590" y="125" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="11">Firebase Auth — 인증 (jena-id-center)</text>
  <text x="590" y="145" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="11">Supabase — DB + Realtime</text>
  <text x="590" y="165" text-anchor="middle" fill="#8b5cf6" font-family="monospace" font-size="11">Cloudflare R2 — 파일 스토리지</text>
  <text x="590" y="200" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="9">각 플랫폼이 가장 잘하는 영역만 담당</text>
  <!-- Phase boxes -->
  <text x="400" y="245" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="12">6-Phase Migration</text>
  <rect x="40" y="260" width="110" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="95" y="282" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">Phase 1-2</text>
  <text x="95" y="298" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">환경변수·의존성</text>
  <rect x="165" y="260" width="110" height="50" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="220" y="282" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-size="9">Phase 3</text>
  <text x="220" y="298" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="9">DB: uuid→text</text>
  <rect x="290" y="260" width="110" height="50" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
  <text x="345" y="282" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="9">Phase 4</text>
  <text x="345" y="298" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">Backend 교체</text>
  <rect x="415" y="260" width="110" height="50" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="470" y="282" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="9">Phase 5</text>
  <text x="470" y="298" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">Web 교체</text>
  <rect x="540" y="260" width="110" height="50" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="595" y="282" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="9">Phase 6</text>
  <text x="595" y="298" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">Admin 교체</text>
  <rect x="665" y="260" width="95" height="50" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="712" y="282" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="9">Build</text>
  <text x="712" y="298" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="9">All Pass</text>
  <!-- SSO benefit -->
  <rect x="40" y="330" width="720" height="45" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="400" y="355" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="12">jena-id-center: Storida · Armo · Contexta — 한 번 가입으로 모든 서비스 이용</text>
  <defs>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#fbbf24"/>
    </marker>
  </defs>
</svg>
