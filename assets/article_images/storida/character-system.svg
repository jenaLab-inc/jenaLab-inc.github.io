<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="#0f172a"/>
  <text x="400" y="40" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="18" font-weight="bold">Multi-Character System + Vision Analysis</text>
  <!-- Upload -->
  <rect x="40" y="70" width="180" height="70" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="130" y="95" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="11" font-weight="bold">Admin Upload</text>
  <text x="130" y="115" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">캐릭터 이미지 1~5장</text>
  <text x="130" y="130" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">PNG/JPG</text>
  <line x1="220" y1="105" x2="270" y2="105" stroke="#475569" stroke-width="1.5" marker-end="url(#a5)"/>
  <!-- Claude Vision -->
  <rect x="270" y="70" width="220" height="70" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="380" y="95" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="11" font-weight="bold">Claude Vision Analysis</text>
  <text x="380" y="115" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">시각적 특징 추출</text>
  <text x="380" y="130" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">한글 + 영문 설명 자동 생성</text>
  <line x1="490" y1="105" x2="540" y2="105" stroke="#475569" stroke-width="1.5" marker-end="url(#a5)"/>
  <!-- Analysis Result -->
  <rect x="540" y="70" width="220" height="70" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="650" y="90" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="11" font-weight="bold">analysis_report</text>
  <text x="650" y="110" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">ko: "갈색 곱슬머리 소녀..."</text>
  <text x="650" y="125" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">en: "curly brown hair girl..."</text>
  <text x="650" y="138" text-anchor="middle" fill="#475569" font-family="monospace" font-size="8">관리자 편집 가능</text>
  <!-- Multi select -->
  <rect x="40" y="175" width="340" height="80" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="210" y="200" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="11" font-weight="bold">Web — 멀티 캐릭터 선택 (max 3)</text>
  <!-- Character boxes -->
  <rect x="65" y="210" width="80" height="35" rx="6" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="105" y="232" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10">★ 토토</text>
  <rect x="160" y="210" width="80" height="35" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="200" y="232" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="10">✓ 미미</text>
  <rect x="255" y="210" width="80" height="35" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="295" y="232" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="10">✓ 뭉치</text>
  <!-- Arrow down -->
  <line x1="210" y1="255" x2="210" y2="290" stroke="#475569" stroke-width="1.5" marker-end="url(#a5)"/>
  <!-- Prompt injection -->
  <rect x="40" y="290" width="720" height="85" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="400" y="315" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="12" font-weight="bold">Gemini Image Prompt — 캐릭터 정보 주입</text>
  <text x="400" y="340" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Main: "curly brown hair girl, large brown eyes, pink dress" + 참조 이미지</text>
  <text x="400" y="358" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Supporting: "white rabbit, long ears, blue ribbon" + 참조 이미지</text>
  <!-- Consistency -->
  <rect x="420" y="175" width="340" height="80" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <text x="590" y="200" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="11" font-weight="bold">Result: 캐릭터 일관성</text>
  <text x="590" y="222" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">텍스트 설명 + 참조 이미지 병행</text>
  <text x="590" y="240" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">→ 매 페이지 동일 외모 재현</text>
  <defs>
    <marker id="a5" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569"/>
    </marker>
  </defs>
</svg>
