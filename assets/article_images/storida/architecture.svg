<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="#0f172a"/>
  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="18" font-weight="bold">System Architecture</text>
  <!-- Presentation Layer -->
  <rect x="60" y="70" width="300" height="50" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="210" y="100" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="13">Web (Next.js) · Admin</text>
  <!-- Arrow -->
  <line x1="210" y1="120" x2="210" y2="150" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Application Layer -->
  <rect x="60" y="150" width="300" height="50" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="210" y="180" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="13">Backend (Express + Drizzle)</text>
  <!-- Arrow -->
  <line x1="210" y1="200" x2="210" y2="230" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Processing Layer -->
  <rect x="60" y="230" width="300" height="50" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="210" y="260" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="13">Scheduler · Claude · Gemini</text>
  <!-- Arrow -->
  <line x1="210" y1="280" x2="210" y2="310" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Infrastructure Layer -->
  <rect x="60" y="310" width="300" height="50" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="210" y="340" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="13">PostgreSQL · R2 · Firebase</text>
  <!-- Right: Deploy -->
  <rect x="440" y="70" width="300" height="130" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="590" y="95" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="12">Deploy</text>
  <text x="590" y="120" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="11">Vercel — Web, Admin</text>
  <text x="590" y="140" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="11">Railway — Backend, Scheduler</text>
  <text x="590" y="160" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="11">Supabase — PostgreSQL</text>
  <text x="590" y="180" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="11">Cloudflare — R2, CDN</text>
  <!-- Right: Monorepo -->
  <rect x="440" y="220" width="300" height="140" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="590" y="245" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="12">Yarn Workspaces Monorepo</text>
  <text x="590" y="270" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="11">apps/web · apps/admin</text>
  <text x="590" y="290" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="11">apps/backend · apps/scheduler</text>
  <text x="590" y="310" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="11">packages/types</text>
  <text x="590" y="340" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">shared TypeScript types</text>
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569"/>
    </marker>
  </defs>
</svg>
