<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="#0f172a"/>
  <text x="400" y="40" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="18" font-weight="bold">Database Workflow</text>
  <!-- Step 1 -->
  <rect x="40" y="70" width="200" height="80" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="100" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="12" font-weight="bold">schema.ts</text>
  <text x="140" y="120" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Drizzle ORM</text>
  <text x="140" y="137" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">TypeScript 정의</text>
  <!-- Arrow 1 -->
  <line x1="240" y1="110" x2="290" y2="110" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="265" y="103" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="9">push</text>
  <!-- Step 2 -->
  <rect x="290" y="70" width="200" height="80" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="390" y="100" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="12" font-weight="bold">Dev DB</text>
  <text x="390" y="120" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Supabase Preview</text>
  <text x="390" y="137" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">빠른 반복 테스트</text>
  <!-- Arrow 2 -->
  <line x1="490" y1="110" x2="540" y2="110" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="515" y="103" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="9">diff</text>
  <!-- Step 3 -->
  <rect x="540" y="70" width="200" height="80" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="640" y="100" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="12" font-weight="bold">Migration .sql</text>
  <text x="640" y="120" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Supabase CLI</text>
  <text x="640" y="137" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">코드 리뷰 대상</text>
  <!-- Arrow down -->
  <line x1="640" y1="150" x2="640" y2="190" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="660" y="175" fill="#fbbf24" font-family="monospace" font-size="9">git push</text>
  <!-- Step 4 -->
  <rect x="540" y="190" width="200" height="80" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="640" y="220" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="12" font-weight="bold">Prod DB</text>
  <text x="640" y="240" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Supabase Production</text>
  <text x="640" y="257" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">검증된 SQL만 실행</text>
  <!-- Tables -->
  <rect x="40" y="200" width="440" height="170" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="260" y="225" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="12">12+ Tables</text>
  <text x="150" y="250" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="10">users</text>
  <text x="260" y="250" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="10">books</text>
  <text x="370" y="250" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="10">book_pages</text>
  <text x="100" y="275" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="10">subscriptions</text>
  <text x="230" y="275" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="10">payments</text>
  <text x="370" y="275" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="10">token_history</text>
  <text x="100" y="300" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="10">characters</text>
  <text x="230" y="300" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="10">styles</text>
  <text x="370" y="300" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="10">writing_prompts</text>
  <text x="100" y="325" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10">jobs</text>
  <text x="230" y="325" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10">notices</text>
  <text x="370" y="325" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10">ai_usage_logs</text>
  <text x="260" y="355" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">model_registry · policies · system_settings</text>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569"/>
    </marker>
  </defs>
</svg>
