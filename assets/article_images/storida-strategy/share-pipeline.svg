<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="#0f172a"/>
  <text x="400" y="32" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="16" font-weight="bold">Social Sharing Pipeline — SSR + OG + Viral Loop</text>

  <!-- Share Page -->
  <rect x="30" y="55" width="230" height="155" rx="8" fill="#1e293b" stroke="#60a5fa" stroke-width="1"/>
  <text x="145" y="78" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="11" font-weight="bold">SSR Share Page</text>
  <text x="45" y="100" fill="#94a3b8" font-family="monospace" font-size="8">• Server Component (async)</text>
  <text x="45" y="116" fill="#94a3b8" font-family="monospace" font-size="8">• Dynamic OG image (1200×630)</text>
  <text x="45" y="132" fill="#94a3b8" font-family="monospace" font-size="8">• Cover + title + meta</text>
  <text x="45" y="148" fill="#94a3b8" font-family="monospace" font-size="8">• "Create with this style" CTA</text>
  <text x="45" y="164" fill="#94a3b8" font-family="monospace" font-size="8">• Share buttons (Kakao/Web)</text>
  <text x="45" y="180" fill="#64748b" font-family="monospace" font-size="7">404 if private or not found</text>
  <text x="45" y="196" fill="#64748b" font-family="monospace" font-size="7">revalidate: 3600 (1h cache)</text>

  <!-- Kakao SDK -->
  <rect x="280" y="55" width="230" height="155" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <text x="395" y="78" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="11" font-weight="bold">Share Button Strategy</text>
  <text x="295" y="100" fill="#fbbf24" font-family="monospace" font-size="9">1. Kakao SDK</text>
  <text x="310" y="116" fill="#94a3b8" font-family="monospace" font-size="8">sendDefault({ feed })</text>
  <text x="295" y="136" fill="#a78bfa" font-family="monospace" font-size="9">2. Web Share API</text>
  <text x="310" y="152" fill="#94a3b8" font-family="monospace" font-size="8">navigator.share() (mobile)</text>
  <text x="295" y="172" fill="#64748b" font-family="monospace" font-size="9">3. Clipboard fallback</text>
  <text x="310" y="188" fill="#94a3b8" font-family="monospace" font-size="8">URL copy (desktop)</text>

  <!-- Query Param Preset -->
  <rect x="530" y="55" width="240" height="155" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <text x="650" y="78" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="11" font-weight="bold">Preset Chain</text>
  <text x="545" y="100" fill="#e2e8f0" font-family="monospace" font-size="8">Share page CTA click</text>
  <text x="545" y="116" fill="#475569" font-family="monospace" font-size="8">↓</text>
  <text x="545" y="130" fill="#e2e8f0" font-family="monospace" font-size="8">/create?style=X&prompt=Y</text>
  <text x="545" y="146" fill="#475569" font-family="monospace" font-size="8">↓</text>
  <text x="545" y="160" fill="#e2e8f0" font-family="monospace" font-size="8">Priority: preset > local > default</text>
  <text x="545" y="176" fill="#475569" font-family="monospace" font-size="8">↓</text>
  <text x="545" y="190" fill="#6ee7b7" font-family="monospace" font-size="8">Pre-filled creation page</text>

  <!-- Viral Loop Flow -->
  <rect x="30" y="230" width="740" height="60" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="400" y="252" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10" font-weight="bold">Viral Loop</text>
  <text x="60" y="272" fill="#e2e8f0" font-family="monospace" font-size="8">Create story</text>
  <text x="160" y="272" fill="#475569" font-family="monospace" font-size="10">→</text>
  <text x="180" y="272" fill="#e2e8f0" font-family="monospace" font-size="8">Share (Kakao)</text>
  <text x="290" y="272" fill="#475569" font-family="monospace" font-size="10">→</text>
  <text x="310" y="272" fill="#e2e8f0" font-family="monospace" font-size="8">OG preview</text>
  <text x="405" y="272" fill="#475569" font-family="monospace" font-size="10">→</text>
  <text x="420" y="272" fill="#e2e8f0" font-family="monospace" font-size="8">"Create with style"</text>
  <text x="555" y="272" fill="#475569" font-family="monospace" font-size="10">→</text>
  <text x="575" y="272" fill="#e2e8f0" font-family="monospace" font-size="8">Pre-filled create</text>
  <text x="695" y="272" fill="#475569" font-family="monospace" font-size="10">→</text>
  <text x="715" y="272" fill="#fbbf24" font-family="monospace" font-size="8">New user</text>

  <!-- Coupon System -->
  <rect x="30" y="305" width="360" height="80" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="210" y="328" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="11" font-weight="bold">Referral Coupon System</text>
  <text x="45" y="348" fill="#94a3b8" font-family="monospace" font-size="8">Share → generate coupon code → attach to URL</text>
  <text x="45" y="364" fill="#94a3b8" font-family="monospace" font-size="8">New user signup → redeem → free tokens</text>
  <text x="45" y="378" fill="#64748b" font-family="monospace" font-size="7">Validation: expiry + unused + not self-referral</text>

  <!-- Per-story + Quick mode -->
  <rect x="410" y="305" width="360" height="80" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <text x="590" y="328" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="11" font-weight="bold">Monetization</text>
  <text x="425" y="348" fill="#94a3b8" font-family="monospace" font-size="8">Per-story: single payment (not billing key)</text>
  <text x="425" y="364" fill="#94a3b8" font-family="monospace" font-size="8">One-tap: name only → server picks template</text>
  <text x="425" y="378" fill="#64748b" font-family="monospace" font-size="7">Reuses existing payment SDK + token system</text>
</svg>