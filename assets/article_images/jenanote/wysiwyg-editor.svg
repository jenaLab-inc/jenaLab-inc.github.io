<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="#0f172a"/>
  <text x="400" y="40" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="18" font-weight="bold">JenaNote — WYSIWYG Markdown Editor</text>
  <!-- Editor window mockup -->
  <rect x="40" y="65" width="440" height="280" rx="8" fill="#1c1c1e" stroke="#334155" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="40" y="65" width="440" height="28" rx="8" fill="#2a2a2e"/>
  <circle cx="58" cy="79" r="5" fill="#ff5f57"/>
  <circle cx="74" cy="79" r="5" fill="#febc2e"/>
  <circle cx="90" cy="79" r="5" fill="#28c840"/>
  <text x="260" y="83" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">my-note.md</text>
  <!-- Toolbar -->
  <rect x="50" y="98" width="420" height="26" rx="4" fill="#252528"/>
  <text x="62" y="115" fill="#e2e8f0" font-family="monospace" font-size="11" font-weight="bold">B</text>
  <text x="82" y="115" fill="#e2e8f0" font-family="monospace" font-size="11" font-style="italic">I</text>
  <text x="102" y="115" fill="#94a3b8" font-family="monospace" font-size="10">H1</text>
  <text x="126" y="115" fill="#94a3b8" font-family="monospace" font-size="10">H2</text>
  <text x="150" y="115" fill="#94a3b8" font-family="monospace" font-size="10">H3</text>
  <text x="178" y="115" fill="#94a3b8" font-family="monospace" font-size="10">UL</text>
  <text x="202" y="115" fill="#94a3b8" font-family="monospace" font-size="10">OL</text>
  <text x="230" y="115" fill="#94a3b8" font-family="monospace" font-size="10">&lt;/&gt;</text>
  <text x="262" y="115" fill="#94a3b8" font-family="monospace" font-size="10">"</text>
  <text x="282" y="115" fill="#94a3b8" font-family="monospace" font-size="10">Link</text>
  <!-- Editor content -->
  <text x="60" y="150" fill="#e2e8f0" font-family="serif" font-size="20" font-weight="bold">Meeting Notes</text>
  <text x="60" y="178" fill="#c4c4c4" font-family="serif" font-size="13">Discussion on the new feature rollout.</text>
  <text x="60" y="198" fill="#c4c4c4" font-family="serif" font-size="13">Key decisions made <tspan font-weight="bold">today</tspan>:</text>
  <text x="72" y="220" fill="#c4c4c4" font-family="serif" font-size="13">• Prioritize mobile first</text>
  <text x="72" y="240" fill="#c4c4c4" font-family="serif" font-size="13">• Ship <tspan font-style="italic">beta</tspan> by end of March</text>
  <text x="72" y="260" fill="#c4c4c4" font-family="serif" font-size="13">• Review metrics weekly</text>
  <rect x="60" y="275" width="400" height="24" rx="3" fill="#1e293b"/>
  <text x="72" y="291" fill="#6ee7b7" font-family="monospace" font-size="11">const data = fetchMetrics();</text>
  <text x="60" y="318" fill="#94a3b8" font-family="serif" font-size="12" font-style="italic">"Speed matters, but direction matters more."</text>
  <!-- No symbols badge -->
  <rect x="350" y="330" width="120" height="20" rx="10" fill="#10b981" opacity="0.2"/>
  <text x="410" y="344" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="9">No # ** - visible</text>
  <!-- Architecture -->
  <rect x="520" y="65" width="240" height="130" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="640" y="88" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">3-Layer Architecture</text>
  <text x="540" y="112" fill="#60a5fa" font-family="monospace" font-size="10">UI</text>
  <text x="580" y="112" fill="#475569" font-family="monospace" font-size="9">TextView · Toolbar</text>
  <text x="570" y="128" fill="#475569" font-family="monospace" font-size="9">↓ NSAttributedString</text>
  <text x="540" y="148" fill="#a78bfa" font-family="monospace" font-size="10">Doc</text>
  <text x="580" y="148" fill="#475569" font-family="monospace" font-size="9">NSDocument subclass</text>
  <text x="570" y="164" fill="#475569" font-family="monospace" font-size="9">↓ serialize / deserialize</text>
  <text x="540" y="184" fill="#6ee7b7" font-family="monospace" font-size="10">Infra</text>
  <text x="580" y="184" fill="#475569" font-family="monospace" font-size="9">Serializer (pure fn)</text>
  <!-- NSDocument benefits -->
  <rect x="520" y="210" width="240" height="135" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
  <text x="640" y="233" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="11" font-weight="bold">NSDocument = Free</text>
  <text x="540" y="255" fill="#64748b" font-family="monospace" font-size="9">Save / Save As dialogs</text>
  <text x="540" y="272" fill="#64748b" font-family="monospace" font-size="9">Unsaved changes warning</text>
  <text x="540" y="289" fill="#64748b" font-family="monospace" font-size="9">Window title ● indicator</text>
  <text x="540" y="306" fill="#64748b" font-family="monospace" font-size="9">Undo / Redo stack</text>
  <text x="540" y="323" fill="#64748b" font-family="monospace" font-size="9">Document restoration</text>
  <text x="540" y="338" fill="#475569" font-family="monospace" font-size="8">→ 0 lines of custom code</text>
  <!-- Build -->
  <rect x="40" y="355" width="720" height="30" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <text x="400" y="375" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="10">Build: swiftc + Makefile · No Xcode · AppKit · CommonMark .md · MIT License</text>
</svg>
