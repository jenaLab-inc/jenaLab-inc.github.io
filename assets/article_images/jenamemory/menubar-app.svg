<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="#0f172a"/>
  <text x="400" y="40" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="18" font-weight="bold">jenaMemory — macOS Menu Bar App</text>
  <!-- Menu bar mockup -->
  <rect x="40" y="65" width="720" height="28" rx="4" fill="#1c1c1e"/>
  <text x="60" y="84" fill="#e2e8f0" font-family="monospace" font-size="12">Wi-Fi  Battery</text>
  <!-- RAM icon -->
  <rect x="610" y="71" width="14" height="16" rx="2" fill="none" stroke="#6ee7b7" stroke-width="1.5"/>
  <rect x="612" y="79" width="10" height="6" rx="1" fill="#6ee7b7" opacity="0.7"/>
  <line x1="613" y1="71" x2="613" y2="68" stroke="#6ee7b7" stroke-width="1"/>
  <line x1="617" y1="71" x2="617" y2="68" stroke="#6ee7b7" stroke-width="1"/>
  <line x1="621" y1="71" x2="621" y2="68" stroke="#6ee7b7" stroke-width="1"/>
  <text x="630" y="84" fill="#6ee7b7" font-family="monospace" font-size="11" font-weight="bold">47%</text>
  <!-- Dropdown -->
  <rect x="560" y="100" width="200" height="160" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="580" y="122" fill="#94a3b8" font-family="monospace" font-size="10">Memory Statistics</text>
  <text x="580" y="142" fill="#e2e8f0" font-family="monospace" font-size="10">Total     16.0 GB</text>
  <text x="580" y="158" fill="#f87171" font-family="monospace" font-size="10">Used       8.5 GB</text>
  <text x="580" y="174" fill="#fbbf24" font-family="monospace" font-size="10">Cached     3.1 GB</text>
  <text x="580" y="190" fill="#6ee7b7" font-family="monospace" font-size="10">Free       4.4 GB</text>
  <line x1="575" y1="200" x2="755" y2="200" stroke="#334155" stroke-width="0.5"/>
  <text x="580" y="218" fill="#60a5fa" font-family="monospace" font-size="10">Optimize Memory</text>
  <text x="580" y="234" fill="#64748b" font-family="monospace" font-size="10">Settings...</text>
  <text x="580" y="250" fill="#64748b" font-family="monospace" font-size="10">Quit</text>
  <!-- Architecture -->
  <rect x="40" y="110" width="480" height="170" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="280" y="135" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="12">Architecture — 8 Swift Files</text>
  <text x="70" y="160" fill="#6ee7b7" font-family="monospace" font-size="10">main.swift → AppDelegate</text>
  <text x="100" y="178" fill="#fbbf24" font-family="monospace" font-size="10">↓</text>
  <text x="70" y="195" fill="#60a5fa" font-family="monospace" font-size="10">MenuBarController</text>
  <text x="240" y="195" fill="#64748b" font-family="monospace" font-size="10">(2s timer · icon · menu)</text>
  <text x="100" y="215" fill="#94a3b8" font-family="monospace" font-size="10">├── MemoryMonitor</text>
  <text x="310" y="215" fill="#475569" font-family="monospace" font-size="9">vm_statistics64</text>
  <text x="100" y="232" fill="#94a3b8" font-family="monospace" font-size="10">├── PrivilegedExecutor</text>
  <text x="310" y="232" fill="#475569" font-family="monospace" font-size="9">sudoers + purge</text>
  <text x="100" y="249" fill="#94a3b8" font-family="monospace" font-size="10">├── Settings / About</text>
  <text x="100" y="266" fill="#94a3b8" font-family="monospace" font-size="10">└── Localization</text>
  <text x="310" y="266" fill="#475569" font-family="monospace" font-size="9">9 languages</text>
  <!-- Build -->
  <rect x="40" y="300" width="340" height="70" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <text x="210" y="325" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="11" font-weight="bold">Build: No Xcode</text>
  <text x="210" y="348" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">swiftc -framework AppKit Sources/*.swift</text>
  <text x="210" y="362" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">Makefile: run · build · install · pkg · dmg</text>
  <!-- Features -->
  <rect x="400" y="300" width="360" height="70" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="580" y="325" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="11" font-weight="bold">Features</text>
  <text x="580" y="348" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">2s refresh · Auto-optimize (60s cooldown)</text>
  <text x="580" y="362" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">LSUIElement=true · 0 dependencies · MIT</text>
</svg>
