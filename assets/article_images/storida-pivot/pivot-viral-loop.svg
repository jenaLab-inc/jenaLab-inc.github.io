<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="#0f172a"/>
  <text x="400" y="32" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="16" font-weight="bold">Storida Pivot — From Book SNS to Viral Loop</text>

  <!-- Before: Book SNS (crossed out) -->
  <rect x="30" y="55" width="220" height="160" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="140" y="78" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="11" font-weight="bold">✕ Book SNS (Rejected)</text>
  <text x="45" y="100" fill="#64748b" font-family="monospace" font-size="8">• Independent social platform</text>
  <text x="45" y="116" fill="#64748b" font-family="monospace" font-size="8">• Reading reviews / ratings</text>
  <text x="45" y="132" fill="#64748b" font-family="monospace" font-size="8">• Goodreads clone</text>
  <text x="45" y="148" fill="#64748b" font-family="monospace" font-size="8">• SNS = hardest to build</text>
  <text x="45" y="164" fill="#64748b" font-family="monospace" font-size="8">• No existing demand signal</text>
  <line x1="30" y1="55" x2="250" y2="215" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
  <line x1="250" y1="55" x2="30" y2="215" stroke="#ef4444" stroke-width="1" opacity="0.4"/>

  <!-- Arrow -->
  <text x="275" y="140" fill="#fbbf24" font-family="monospace" font-size="20">→</text>

  <!-- After: Viral Loop -->
  <rect x="305" y="55" width="220" height="160" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="415" y="78" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="11" font-weight="bold">✓ Viral Loop Engine</text>
  <text x="320" y="100" fill="#94a3b8" font-family="monospace" font-size="8">• Share link (Kakao + OG)</text>
  <text x="320" y="116" fill="#94a3b8" font-family="monospace" font-size="8">• "Create with this style"</text>
  <text x="320" y="132" fill="#94a3b8" font-family="monospace" font-size="8">• Gallery as starting point</text>
  <text x="320" y="148" fill="#94a3b8" font-family="monospace" font-size="8">• Tool-first → Social later</text>
  <text x="320" y="164" fill="#94a3b8" font-family="monospace" font-size="8">• Canva share model</text>

  <!-- Viral Loop Diagram -->
  <rect x="555" y="55" width="220" height="160" rx="8" fill="#1e293b" stroke="#60a5fa" stroke-width="1"/>
  <text x="665" y="78" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="11" font-weight="bold">Viral Loop Flow</text>
  <text x="665" y="102" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="9">Parent creates story</text>
  <text x="665" y="118" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">↓</text>
  <text x="665" y="132" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="9">Share via Kakao / SNS</text>
  <text x="665" y="148" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">↓</text>
  <text x="665" y="162" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="9">Recipient: "I want this too"</text>
  <text x="665" y="178" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">↓</text>
  <text x="665" y="192" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="9">→ New user (K=1.2)</text>

  <!-- Phased Approach -->
  <rect x="30" y="235" width="745" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="55" y="258" fill="#94a3b8" font-family="monospace" font-size="9" font-weight="bold">Phased:</text>
  <text x="120" y="258" fill="#60a5fa" font-family="monospace" font-size="9">B) Tool-first</text>
  <text x="225" y="258" fill="#475569" font-family="monospace" font-size="9">→</text>
  <text x="245" y="258" fill="#a78bfa" font-family="monospace" font-size="9">C) Embedded social</text>
  <text x="390" y="258" fill="#475569" font-family="monospace" font-size="9">→</text>
  <text x="410" y="258" fill="#6ee7b7" font-family="monospace" font-size="9">A) Independent platform</text>
  <text x="590" y="258" fill="#475569" font-family="monospace" font-size="8">(only after validation)</text>

  <!-- Validation Metrics -->
  <rect x="30" y="300" width="360" height="85" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="210" y="322" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10" font-weight="bold">Validation Signals (10 users)</text>
  <text x="45" y="342" fill="#94a3b8" font-family="monospace" font-size="8">Reuse: 30%+   Voluntary share: 20%+</text>
  <text x="45" y="358" fill="#94a3b8" font-family="monospace" font-size="8">Payment intent: 30%+   Referral: 20%+</text>
  <text x="45" y="374" fill="#64748b" font-family="monospace" font-size="7">Pass 3/4 → proceed  |  ≤2/4 → pivot</text>

  <!-- Key Insight -->
  <rect x="410" y="300" width="365" height="85" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="592" y="322" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="10" font-weight="bold">Core Reframe</text>
  <text x="425" y="342" fill="#e2e8f0" font-family="monospace" font-size="8">"Do we need a Book SNS?"</text>
  <text x="425" y="358" fill="#475569" font-family="monospace" font-size="8">↓ reframed to</text>
  <text x="425" y="374" fill="#fbbf24" font-family="monospace" font-size="8">"How do we make results bring new users?"</text>
</svg>