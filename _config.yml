future: true
timezone: Asia/Seoul

# Build settings
plugins:
  - jemoji
  - jekyll-paginate

# Collections
collections:
  en_posts:
    output: true
    permalink: /en/:year/:month/:day/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      lang: ko
  - scope:
      path: ""
      type: "en_posts"
    values:
      lang: en

# Site settings
title: JenaLab Technical Blog
description: "AI SaaS, macOS 네이티브 앱, 시스템 아키텍처에 대한 기술 블로그. Storida, jenaMemory, JenaNote, JenaImage 프로젝트의 설계와 구현을 다룹니다."

i18n:
  en:
    description: "Technical blog on AI SaaS, native macOS apps, and system architecture. Covers design and implementation of Storida, jenaMemory, JenaNote, and JenaImage."

email: jenalab@jenalab.com
#blog logo
logo: "/assets/images/jenalab_horizontal.png"
float_logo: true # true, false (default)

# blog cover
cover: "/assets/images/cA4aKEIPQrerBnp1yGHv_IMG_9534-3-2.jpg"

name: 'JenaLab'
author: 'Jerome Na'
author_image: "/assets/images/author.jpg"

paginate:	10
excerpt_separator: "\n\n"

url: "https://jenalab-inc.github.io" # the base hostname & protocol for your site
baseurl: ""
